name: Update flight data

on:
  # 코드 변경 시 즉시 1회 실행(스케줄 크론이 지연·누락돼도 최소한 배포 때마다 갱신됨).
  # data.json만 바뀐 봇 커밋은 제외해 무한 루프를 막는다.
  push:
    branches: [main]
    paths-ignore:
      - 'docs/data.json'
  schedule:
    # 15분마다 갱신. 정시(:00)는 전 세계 작업이 몰려 지연이 크므로 피해서 :05/:20/:35/:50에 실행.
    - cron: "5,20,35,50 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run updater
        run: python scripts/update.py
        env:
          # 인천공항 공식 '여객편 운항현황' API 키(저장소 시크릿). 없으면 인천 대조는 조용히 건너뛴다.
          ICN_API_KEY: ${{ secrets.ICN_API_KEY }}

      - name: Commit & push if changed
        run: |
          git config user.name "qr-monitor-bot"
          git config user.email "qr-monitor-bot@users.noreply.github.com"
          # 방금 생성한 data.json 을 '항상 최신 origin 위에' 새로 얹어 커밋한다.
          # 이전엔 커밋 후 rebase 했는데, 다른 실행이 동시에 data.json 을 바꾸면
          # 같은 파일 충돌로 rebase 가 실패해 '실행 실패' 알림이 떴다(사이트엔 무해).
          # reset 방식은 매번 최신 기준으로 다시 얹으므로 충돌이 원천적으로 없다.
          for i in 1 2 3 4 5; do
            git fetch -q origin main
            git reset -q --mixed FETCH_HEAD        # HEAD만 최신 origin으로(생성된 data.json은 작업트리에 유지)
            git add docs/data.json
            if git diff --cached --quiet; then
              echo "no data change vs origin; nothing to commit"; exit 0
            fi
            git commit -q -m "data: update $(date -u +'%Y-%m-%dT%H:%MZ')"
            if git push -q origin HEAD:main; then
              echo "pushed on attempt $i"; exit 0
            fi
            echo "attempt $i lost a race; rebuilding onto latest origin..."; sleep 4
          done
          # 5회 시도 후에도 저장 못한 경우: 이 실행은 '실패'로 처리하지 않는다(=GitHub 실패 메일 없음).
          #  이유: 마지막 정상 데이터가 그대로 화면에 유지되고, 다음 실행(≤15분)이 자동 복구한다.
          #  만약 계속(지속적으로) 저장이 안 되면 데이터가 오래되므로, 3시간마다 도는
          #  '자가점검·복구' 작업이 그때 원인·조치법과 함께 알려준다(복구 안 될 때만 알림).
          echo "WARN: could not push this run; last-good data stays live and next run recovers."
          exit 0
