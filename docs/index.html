var DATA = null, map = null, markers = {};
var CALLSIGNS = { "QR858": "QTR858", "QR859": "QTR859", "QR862": "QTR862" };

function esc(s) { return String(s == null ? "" : s).replace(/[&<>"]/g, function(c){
  return {"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;"}[c]; }); }
function t() { return I18N[LANG]; }

function applyStatic() {
  document.documentElement.lang = LANG;
  document.querySelectorAll("[data-i18n]").forEach(function(el) {
    var v = t()[el.getAttribute("data-i18n")];
    if (typeof v === "string") el.innerHTML = v;
  });
  document.getElementById("footNotice").innerHTML = t().foot_notice;
  document.getElementById("langKo").className = LANG === "ko" ? "on" : "";
  document.getElementById("langEn").className = LANG === "en" ? "on" : "";
  document.getElementById("exampleList").innerHTML = t().examples.map(function(e){
    return "<div class='bubble " + e.type + "'><div class='bt'>" + esc(e.t) +
      "</div><div class='bd'>" + esc(e.d) + "</div></div>";
  }).join("");
  setMode(MODE);
  updatePhonePlaceholder();
}

function phonePlaceholder() {
  if (subTypeEl.value !== "phone") return t().ph_email;
  if (ccode.value === "+82") return t().ph_phone_kr;
  if (ccode.value === "+974") return t().ph_phone_qa;
  return t().ph_phone;
}
function updatePhonePlaceholder() { contact.placeholder = phonePlaceholder(); }

function setMode(m) {
  MODE = m;
  var isSub = (m === "sub");
  document.getElementById("tabSub").className = isSub ? "on" : "";
  document.getElementById("tabUnsub").className = isSub ? "" : "on";
  document.getElementById("subHeading").textContent = isSub ? t().sub_title : t().unsub_title;
  document.getElementById("subDescP").textContent = isSub ? t().sub_desc : t().unsub_desc;
  var btn = document.getElementById("submitBtn");
  btn.textContent = isSub ? t().btn_submit : t().btn_unsub;
  btn.className = isSub ? "submit" : "submit danger";
  document.getElementById("modeField").value = isSub ? "subscribe" : "unsubscribe";
  document.getElementById("formMsg").style.display = "none";
}

function kindLabel(d) {
  if (d.kind === "delayed") return t().delayed(d.delay);
  return t().kinds[d.kind] || d.kind;
}
function badgeLabel(b) {
  if (b.kind === "delayed") return t().badge_delayed(b.delay || 0);
  return t().badge[b.kind] || t().badge.normal;
}

function renderAirstrip() {
  var strip = document.getElementById("airstrip");
  var closed = DATA && DATA.airspace && DATA.airspace.closed;
  var risk = (DATA && DATA.airspace && DATA.airspace.risk_level) || null;
  if (closed) {
    strip.className = "airstrip closed";
    document.getElementById("airTitle").textContent = t().air_closed_title;
    document.getElementById("airSub").textContent = t().air_closed_sub;
  } else {
    strip.className = "airstrip open";
    document.getElementById("airTitle").textContent = t().air_open_title;
    document.getElementById("airSub").textContent = t().air_open_sub(risk ? esc(risk) : "");
  }
  document.getElementById("airSrc").innerHTML = t().air_src();
}

function render() {
  if (!DATA) return;
  var data = DATA;
  document.getElementById("updated").textContent = t().updated(data);
  renderAirstrip();

  var banner = document.getElementById("banner");
  var alerts = data.alerts || [];
  var closed = data.airspace && data.airspace.closed;
  var risk = (data.airspace && data.airspace.risk_level) || null;
  if (alerts.length > 0 || closed) {
    banner.className = "banner crit";
    var msgs = alerts.map(function(a) {
      var base = a.flight + " " + a.date.slice(5).replace("-", "/");
      if (a.type === "delay") return base + (LANG === "ko" ? " 지연 " + a.minutes + "분" : " delayed " + a.minutes + " min");
      if (a.type === "cancelled") return base + (LANG === "ko" ? " 결항" : " cancelled");
      return base + (LANG === "ko" ? " 회항" : " diverted");
    });
    if (closed) msgs.unshift(LANG === "ko" ? "카타르 영공 폐쇄" : "Qatar airspace closed");
    document.getElementById("bannerTitle").textContent = t().banner_alert_title + " — " + msgs.join(" · ");
    document.getElementById("bannerBody").innerHTML = t().banner_alert_body;
  } else {
    banner.className = "banner";
    document.getElementById("bannerTitle").textContent = t().banner_ok_title;
    document.getElementById("bannerBody").innerHTML = t().banner_ok_body(esc(risk));
  }
  banner.style.display = "";

  var order = ["QR858", "QR859", "QR862"];
  var html = "";
  order.forEach(function(fno) {
    var f = data.flights[fno];
    if (!f) return;
    var bcls = { good: "b-good", warn: "b-warn", crit: "b-crit" }[f.badge.state] || "b-good";
    var route = LANG === "ko" ? f.route : f.route_en;
    var note = LANG === "ko" ? f.note : f.note_en;
    var labels = LANG === "ko" ? f.labels : f.labels_en;
    var rows = (f.days || []).map(function(d) {
      var cls = { good: "st-good", plan: "st-plan", warn: "st-warn", crit: "st-crit" }[d.cls] || "st-plan";
      var depTxt = LANG === "ko" ? d.dep : String(d.dep).replace("익일", "+1d");
      var arrTxt = LANG === "ko" ? d.arr : String(d.arr).replace("익일", "+1d");
      return "<tr><td>" + esc(LANG === "ko" ? d.label : d.label_en) + "</td><td>" + esc(depTxt) +
             "</td><td>" + esc(arrTxt) + "</td><td class='" + cls + "'>" + esc(kindLabel(d)) + "</td></tr>";
    }).join("");
    html += "<div class='card'><div class='card-top'><div>" +
      "<div class='fno'>" + esc(fno) + "</div>" +
      "<div class='route'>" + esc(route) + " · " + esc(note) + "</div></div>" +
      "<span class='badge " + bcls + "'><span class='dot'></span>" + esc(badgeLabel(f.badge)) + "</span></div>" +
      "<table><thead><tr><th>" + t().th[0] + "</th><th>" + esc(labels.dep) + "</th><th>" +
      esc(labels.arr) + "</th><th>" + t().th[1] + "</th></tr></thead><tbody>" + rows + "</tbody></table>" +
      "<div class='links'>" +
      "<a href='" + esc(f.fr24) + "' target='_blank' rel='noopener'>" + t().links[0] + "</a>" +
      "<a href='https://www.flightstats.com/v2/flight-tracker/QR/" + fno.slice(2) + "' target='_blank' rel='noopener'>" + t().links[1] + "</a>" +
      "<a href='https://fs.qatarairways.com/' target='_blank' rel='noopener'>" + t().links[2] + "</a>" +
      "</div></div>";
  });
  document.getElementById("cards").innerHTML = html;

  order.forEach(function(fno) {
    var p = data.flights[fno] && data.flights[fno].position;
    if (p && p.lat != null) placeMarker(fno, p.lat, p.lon, p.alt_ft);
  });
}

function setLang(l) {
  LANG = l; ls_set("qrmon_lang", l);
  applyStatic(); render();
}

function ensureMap() {
  if (map) return;
  var el = document.getElementById("map");
  el.style.display = "block";
  document.getElementById("mapNote").style.display = "block";
  map = L.map("map").setView([32, 85], 3);
  L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",
    { attribution: "&copy; OpenStreetMap contributors", maxZoom: 10 }).addTo(map);
  L.circleMarker([25.273, 51.608], {radius:5, color:"#52514e"}).addTo(map).bindTooltip("DOH");
  L.circleMarker([37.469, 126.451], {radius:5, color:"#52514e"}).addTo(map).bindTooltip("ICN");
}
function placeMarker(fno, lat, lon, alt) {
  ensureMap();
  var label = fno + (alt ? " · " + alt + " ft" : "");
  if (markers[fno]) { markers[fno].setLatLng([lat, lon]).setTooltipContent(label); return; }
  markers[fno] = L.circleMarker([lat, lon],
    { radius: 8, color: "#2a78d6", fillColor: "#2a78d6", fillOpacity: 0.85 })
    .addTo(map).bindTooltip(label, { permanent: true, direction: "top" });
}
function pollPositions() {
  Object.keys(CALLSIGNS).forEach(function(fno) {
    fetch("https://api.adsb.lol/v2/callsign/" + CALLSIGNS[fno])
      .then(function(r){ return r.json(); })
      .then(function(j) {
        var ac = (j.ac || [])[0];
        if (ac && ac.lat != null) placeMarker(fno, ac.lat, ac.lon, ac.alt_baro);
      })
      .catch(function(){});
  });
}

document.getElementById("hitsBadge").src =
  "https://hits.sh/" + location.hostname + location.pathname.replace(/index\.html$/, "") + ".svg?label=visits&color=2a78d6";

var subTypeEl = document.getElementById("subType"),
    ccode = document.getElementById("ccode"),
    ccodeManual = document.getElementById("ccodeManual"),
    contact = document.getElementById("contact");

function syncCcodeManual() {
  ccodeManual.style.display = (subTypeEl.value === "phone" && ccode.value === "__other") ? "" : "none";
}
subTypeEl.addEventListener("change", function() {
  var phone = subTypeEl.value === "phone";
  ccode.style.display = phone ? "" : "none";
  syncCcodeManual();
  contact.type = phone ? "tel" : "text";
  updatePhonePlaceholder();
});
ccode.addEventListener("change", function(){ syncCcodeManual(); updatePhonePlaceholder(); });

function genSubNo() {
  var d = new Date();
  var y = String(d.getFullYear()).slice(2);
  var mm = ("0" + (d.getMonth() + 1)).slice(-2);
  var dd = ("0" + d.getDate()).slice(-2);
  var rand = Math.random().toString(36).slice(2, 6).toUpperCase();
  return "QRDOH-" + y + mm + dd + "-" + rand;
}

// 국가번호 결합 시 국내 통화용 앞자리 0 제거 (예: +82 + 01012345678 → +82-1012345678)
function buildContact() {
  var isPhone = subTypeEl.value === "phone";
  if (!isPhone) return { cc: "", full: contact.value.trim() };
  var cc = (ccode.value === "__other") ? (ccodeManual.value || "").trim() : ccode.value;
  var local = contact.value.replace(/[^0-9]/g, "");
  if (cc) local = local.replace(/^0+/, "");   // 국가번호 붙일 때 트렁크 0 제거
  var full = cc ? (cc + "-" + local) : contact.value.trim();
  return { cc: cc, full: full };
}

document.getElementById("subForm").addEventListener("submit", function(e) {
  e.preventDefault();
  var built = buildContact();
  var msg = document.getElementById("formMsg");

  document.getElementById("contactFinal").value = built.full;
  document.getElementById("ccodeFinal").value = built.cc;

  if (MODE === "sub") {
    var no = genSubNo();
    document.getElementById("subNoField").value = no;
    document.getElementById("subjectField").value = "[QR Flight Monitor] Subscribe " + no;
    msg.className = "form-msg";
    msg.innerHTML = t().sub_done(no, esc(built.full));
  } else {
    document.getElementById("subjectField").value = "[QR Flight Monitor] UNSUBSCRIBE";
    msg.className = "form-msg cancel";
    msg.innerHTML = t().unsub_done(esc(built.full));
  }

  var data = new FormData(this);
  fetch(this.action, { method: "POST", body: data, headers: { "Accept": "application/json" } })
    .catch(function(){});

  msg.style.display = "block";
  this.reset();
  ccode.style.display = "none"; ccodeManual.style.display = "none";
  setMode(MODE);
});

applyStatic();
fetch("data.json?t=" + Date.now())
  .then(function(r){ if (!r.ok) throw new Error(r.status); return r.json(); })
  .then(function(d){ DATA = d; render(); pollPositions(); setInterval(pollPositions, 60000); })
  .catch(function(){
    document.getElementById("updated").textContent = "";
    document.getElementById("loadError").style.display = "block";
  });
</script>
